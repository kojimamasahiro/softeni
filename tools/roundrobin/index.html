<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ラウンドロビン試合管理（グループ対応）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>ラウンドロビン試合管理（グループ対応）</h1>
    <div id="matches"></div>
    <button onclick="onClickGenerate()">出力</button>
    <h2>JSON出力（成形済み）</h2>
    <p style="font-size: 12px; color: #555; margin: 4px 0">
      下のJSONは直接編集できます。編集するとスコア入力では上書きされなくなり、編集内容がそのままコピー／ダウンロード／保存に使われます。試合結果から作り直したい場合は
      <button type="button" onclick="onClickRegenerateJson()">試合結果から再生成</button>
      を押してください。
      <span id="jsonEditStatus" style="margin-left: 8px"></span>
    </p>
    <div id="saveUi"></div>
    <textarea id="jsonOutput"></textarea>

    <h2>トーナメントへ進出</h2>
    <div style="margin: 8px 0">
      <label>
        各グループ上位
        <input type="number" id="advanceRank" value="1" min="1" style="width: 50px" />
        位を進出:
      </label>
      <button onclick="onClickExtractAdvancers()">進出ペアを抽出</button>
      <button onclick="onClickGoTournament()">トーナメント画面へ</button>
      <span id="advanceStatus" style="font-size: 12px; color: #c62828"></span>
    </div>
    <p style="font-size: 12px; color: #555; margin: 4px 0">
      抽出結果は下で編集できます（並び順がそのまま組み合わせ順になります）。
    </p>
    <textarea id="advancersJson" style="height: 160px"></textarea>

    <script src="initialPlayer.js"></script>
    <script src="../shared/normalize-core.js"></script>
    <script src="../shared/tool-bridge.js"></script>
    <script>
      const initScore = 4; // 初期スコア

      // ハブページからの入力があれば initialPlayer.js より優先
      const playersByGroup =
        ToolBridge.loadInput('roundrobin') ||
        (typeof initialPlayersByGroup !== 'undefined'
          ? initialPlayersByGroup
          : {});

      const byePlayer = { id: 'bye', name: 'パッキン', information: [] };
      const allGroupMatches = {};

      for (const group in playersByGroup) {
        const players = playersByGroup[group];
        const matches = [];
        for (let i = 0; i < players.length; i++) {
          for (let j = i + 1; j < players.length; j++) {
            const p1 = players[i];
            const p2 = players[j];
            if (p1.id === 'bye' || p2.id === 'bye') continue;
            matches.push({
              group,
              p1,
              p2,
              scores: { p1: initScore, p2: initScore },
              winner: null,
            });
          }
        }
        allGroupMatches[group] = matches;
      }

      // ---- JSON出力の手動編集対応 ----
      let jsonManuallyEdited = false;

      function setJsonEditStatus() {
        const statusEl = document.getElementById('jsonEditStatus');
        if (!statusEl) return;
        if (!jsonManuallyEdited) {
          statusEl.textContent = '';
          return;
        }
        const value = document.getElementById('jsonOutput').value;
        let valid = true;
        try {
          JSON.parse(value);
        } catch (e) {
          valid = false;
        }
        if (valid) {
          statusEl.textContent = '手動編集中（JSON OK）';
          statusEl.style.color = '#2e7d32';
        } else {
          statusEl.textContent = '手動編集中（JSONが不正です）';
          statusEl.style.color = '#c62828';
        }
      }

      function onClickGenerate() {
        // 手動編集を尊重しつつ、未編集なら通常通り生成する
        updateJsonOutput();
      }

      // 試合結果から作り直す（手動編集を破棄）
      function onClickRegenerateJson() {
        if (
          jsonManuallyEdited &&
          !confirm('手動編集した内容を破棄して試合結果から再生成しますか？')
        ) {
          return;
        }
        jsonManuallyEdited = false;
        updateJsonOutput(true);
        setJsonEditStatus();
      }

      function updateWinner(match) {
        if (match.scores.p1 != null && match.scores.p2 != null) {
          if (match.scores.p1 > match.scores.p2) match.winner = match.p1.id;
          else if (match.scores.p2 > match.scores.p1)
            match.winner = match.p2.id;
          else match.winner = null;
        }
      }

      // ---- 追加/変更：名前生成・カテゴリ判定 ----
      function buildPairName(information) {
        const names = information.map(
          ({ lastName, firstName }) => `${lastName} ${firstName}`,
        );
        const teams = [
          ...new Set(information.map(({ team }) => team).filter(Boolean)),
        ];
        if (teams.length === 1) return `${names.join('・')}（${teams[0]}）`;
        return information
          .map(
            ({ lastName, firstName, team }) =>
              `${lastName} ${firstName}（${team}）`,
          )
          .join('・');
      }

      function getDisplayName(entry) {
        let baseName = '';
        if (Array.isArray(entry.information) && entry.information.length) {
          baseName = buildPairName(entry.information); // doubles等
        } else {
          baseName = entry.name || String(entry.id); // team等
        }
        // idが存在し、byeでなければ先頭に付与
        if (entry.id && entry.id !== 'bye') {
          return `${entry.id}. ${baseName}`;
        }
        return baseName;
      }

      function detectCategory(entry) {
        if (entry.category) return entry.category; // 明示があれば最優先
        if (Array.isArray(entry.information) && entry.information.length)
          return 'doubles';
        if (entry.team) return 'team';
        return 'unknown';
      }
      // ---------------------------------------

      // 1. 最初に matchesDiv に1回だけイベントを仕込む
      let eventRegistered = false;

      function displayMatches() {
        const matchesDiv = document.getElementById('matches');
        matchesDiv.innerHTML = '';

        for (const group in allGroupMatches) {
          const title = document.createElement('h2');
          title.textContent = `グループ ${group}`;
          matchesDiv.appendChild(title);

          allGroupMatches[group].forEach((match, i) => {
            const div = document.createElement('div');
            div.className = 'match-result';
            div.dataset.match = `${group}-${i}`;
            div.innerHTML = renderMatchHtml(match, i);
            matchesDiv.appendChild(div);
          });
        }

        if (!eventRegistered) {
          document
            .getElementById('matches')
            .addEventListener('click', handleScoreClick);
          eventRegistered = true;
        }
      }

      function renderMatchHtml(match, i) {
        i = parseInt(i);
        const matchId = match.group + '-' + i;
        const renderButtons = (playerKey) => {
          return (
            [0, 1, 2, 3, 4, 5]
              .map((score) => {
                const selected =
                  match.scores[playerKey] === score ? 'selected' : '';
                return `<button data-match='${matchId}' data-player='${playerKey}' data-score='${score}' class='score-button ${selected}'>${score}</button>`;
              })
              .join('') +
            `<button class='retire-button' data-match='${matchId}' data-player='${playerKey}'>R</button>`
          );
        };

        const p1Name = getDisplayName(match.p1);
        const p2Name = getDisplayName(match.p2);

        return `
            <strong>試合 ${i + 1}</strong><br />
            <div>${p1Name} vs ${p2Name}</div>
            <div>${renderButtons('p1')} <span>← ${p1Name}</span></div>
            <div>${renderButtons('p2')} <span>← ${p2Name}</span></div>
            <div>勝者: <span id='winner-${matchId}'>${match.winner === match.p1.id ? p1Name : match.winner === match.p2.id ? p2Name : '未定'}</span></div>
            `;
      }

      function handleScoreClick(e) {
        const target = e.target;
        if (!target.dataset.match) return;

        const [group, idx] = target.dataset.match.split('-');
        const match = allGroupMatches[group][parseInt(idx)];
        const matchDiv = document.querySelector(
          `.match-result[data-match="${group}-${idx}"]`,
        );

        if (target.classList.contains('score-button')) {
          const player = target.dataset.player;
          const score = parseInt(target.dataset.score);
          match.scores[player] = score;
          updateWinner(match);
          matchDiv.innerHTML = renderMatchHtml(match, idx);
          updateJsonOutput();
        } else if (target.classList.contains('retire-button')) {
          const player = target.dataset.player;
          const opponent = player === 'p1' ? 'p2' : 'p1';
          match[player].retired = true;
          match.scores[player] = 0;
          match.scores[opponent] = initScore;
          match.winner = match[opponent].id;
          matchDiv.innerHTML = renderMatchHtml(match, idx);
          updateJsonOutput();
        }
      }

      function updateJsonOutput(force = false) {
        const output = { roundRobinMatches: [] };

        for (const group in allGroupMatches) {
          for (const match of allGroupMatches[group]) {
            if (!match.winner) continue;

            const cat1 = detectCategory(match.p1);
            const cat2 = detectCategory(match.p2);
            const category = cat1 === cat2 ? cat1 : cat1; // 混在はまずない想定。あれば p1 優先。

            const p1Score = String(match.scores.p1);
            const p2Score = String(match.scores.p2);

            if (category === 'team') {
              // ---- team カテゴリの出力 ----
              const p1Key =
                match.p1.tempId || match.p1.team || String(match.p1.id);
              const p2Key =
                match.p2.tempId || match.p2.team || String(match.p2.id);

              // p1 視点
              output.roundRobinMatches.push({
                group,
                team: p1Key, // 識別キー（tempId/チーム名/IDの順）
                opponentTeam: {
                  team: match.p2.team || p2Key,
                  prefecture: match.p2.prefecture || '',
                },
                result: match.winner === match.p1.id ? 'win' : 'lose',
                games: { won: p1Score, lost: p2Score },
                entryNo: match.p1.id,
                name: getDisplayName(match.p1),
                category: 'team',
                retired: match.p1.retired || false,
              });

              // p2 視点
              output.roundRobinMatches.push({
                group,
                team: p2Key,
                opponentTeam: {
                  team: match.p1.team || p1Key,
                  prefecture: match.p1.prefecture || '',
                },
                result: match.winner === match.p2.id ? 'win' : 'lose',
                games: { won: p2Score, lost: p1Score },
                entryNo: match.p2.id,
                name: getDisplayName(match.p2),
                category: 'team',
                retired: match.p2.retired || false,
              });
            } else {
              // ---- doubles（従来） ----
              const p1Ids = (match.p1.information || []).map(
                (info) => info.playerId || info.tempId,
              );
              const p2Ids = (match.p2.information || []).map(
                (info) => info.playerId || info.tempId,
              );
              const p1IsValid =
                p1Ids.length > 0 && p1Ids.every((id) => id != null);
              const p2IsValid =
                p2Ids.length > 0 && p2Ids.every((id) => id != null);

              if (p1IsValid) {
                output.roundRobinMatches.push({
                  group,
                  pair: p1Ids,
                  opponents: match.p2.information || [],
                  result: match.winner === match.p1.id ? 'win' : 'lose',
                  games: { won: p1Score, lost: p2Score },
                  entryNo: match.p1.id,
                  name: getDisplayName(match.p1),
                  category: 'doubles',
                  retired: match.p1.retired || false,
                });
              }

              if (p2IsValid) {
                output.roundRobinMatches.push({
                  group,
                  pair: p2Ids,
                  opponents: match.p1.information || [],
                  result: match.winner === match.p2.id ? 'win' : 'lose',
                  games: { won: p2Score, lost: p1Score },
                  entryNo: match.p2.id,
                  name: getDisplayName(match.p2),
                  category: 'doubles',
                  retired: match.p2.retired || false,
                });
              }
            }
          }
        }

        // ---- standings はそのままでOK（nameとidがあれば動く）----
        // ---- standings 修正版 ----
        output.standings = {};

        for (const group in playersByGroup) {
          const players = playersByGroup[group].filter(
            (p) => p.id !== 'bye',
          );
          const playerStats = {};

          // 初期化
          for (const p of players) {
            playerStats[p.id] = {
              id: p.id,
              name: p.name,
              wins: 0,
              losses: 0,
              scoreDiff: 0,
              totalPointsFor: 0,
              totalPointsAgainst: 0,
            };
          }

          // 全試合集計
          for (const match of allGroupMatches[group]) {
            const { p1, p2, scores, winner } = match;
            if (!winner || p1.id === 'bye' || p2.id === 'bye') continue;
            const s1 = scores.p1,
              s2 = scores.p2;

            playerStats[p1.id].scoreDiff += s1 - s2;
            playerStats[p2.id].scoreDiff += s2 - s1;
            playerStats[p1.id].totalPointsFor += s1;
            playerStats[p1.id].totalPointsAgainst += s2;
            playerStats[p2.id].totalPointsFor += s2;
            playerStats[p2.id].totalPointsAgainst += s1;

            if (winner === p1.id) {
              playerStats[p1.id].wins++;
              playerStats[p2.id].losses++;
            } else {
              playerStats[p2.id].wins++;
              playerStats[p1.id].losses++;
            }
          }

          // 同率時に使う「当該者間」比較関数
          function compareHeadToHead(ids) {
            const subStats = {};
            ids.forEach((id) => {
              subStats[id] = { id, wins: 0, diff: 0 };
            });

            // 当該者間だけ再集計
            for (const match of allGroupMatches[group]) {
              const { p1, p2, scores, winner } = match;
              if (!winner) continue;
              if (!ids.includes(p1.id) || !ids.includes(p2.id)) continue;

              const s1 = scores.p1,
                s2 = scores.p2;
              subStats[p1.id].diff += s1 - s2;
              subStats[p2.id].diff += s2 - s1;

              if (winner === p1.id) subStats[p1.id].wins++;
              else subStats[p2.id].wins++;
            }

            return subStats;
          }

          // ソート
          let sorted = Object.values(playerStats);

          sorted.sort((a, b) => {
            // まず勝数
            if (b.wins !== a.wins) return b.wins - a.wins;

            // 同率チーム群の当該者間比較
            const tied = sorted.filter((s) => s.wins === a.wins);
            if (tied.length > 1) {
              const headToHead = compareHeadToHead(tied.map((s) => s.id));
              const diffA = headToHead[a.id]?.wins ?? 0;
              const diffB = headToHead[b.id]?.wins ?? 0;
              if (diffB !== diffA) return diffB - diffA;

              // 当該者間の得失差
              const subA = headToHead[a.id]?.diff ?? 0;
              const subB = headToHead[b.id]?.diff ?? 0;
              if (subB !== subA) return subB - subA;
            }

            // まだ同じなら全試合の得失差
            if (b.scoreDiff !== a.scoreDiff) return b.scoreDiff - a.scoreDiff;

            // 同点なら総得点で
            if (b.totalPointsFor !== a.totalPointsFor)
              return b.totalPointsFor - a.totalPointsFor;

            return 0; // 完全同点（抽選扱い）
          });

          // 順位付け
          sorted.forEach((s, i) => (s.rank = i + 1));
          output.standings[group] = sorted;
        }

        lastRawOutput = output;

        // 手動編集済みのときは上書きしない（force時のみ再生成）
        if (jsonManuallyEdited && !force) {
          return;
        }

        try {
          document.getElementById('jsonOutput').value =
            ToolBridge.normalize(output);
        } catch (e) {
          document.getElementById('jsonOutput').value =
            '成形エラー: ' + (e && e.message ? e.message : e);
        }
      }

      // ---- 成形済み出力の保存UI ----
      let lastRawOutput = null;
      ToolBridge.buildSaveUI(document.getElementById('saveUi'), () =>
        document.getElementById('jsonOutput').value.startsWith('成形エラー')
          ? ''
          : document.getElementById('jsonOutput').value,
      );

      // ---- トーナメント進出 ----
      function onClickExtractAdvancers() {
        const statusEl = document.getElementById('advanceStatus');
        statusEl.textContent = '';
        updateJsonOutput();
        if (!lastRawOutput || !lastRawOutput.standings) {
          statusEl.textContent = '順位が確定していません';
          return;
        }
        const n =
          parseInt(document.getElementById('advanceRank').value, 10) || 1;
        const advancers = [];
        // rank優先（各グループ1位→各グループ2位…の順）
        for (let rank = 1; rank <= n; rank++) {
          for (const group in lastRawOutput.standings) {
            const standing = lastRawOutput.standings[group].find(
              (s) => s.rank === rank,
            );
            if (!standing) continue;
            const player = (playersByGroup[group] || []).find(
              (p) => String(p.id) === String(standing.id),
            );
            if (player) advancers.push(player);
          }
        }
        document.getElementById('advancersJson').value = JSON.stringify(
          advancers,
          null,
          2,
        );
        statusEl.style.color = '#2e7d32';
        statusEl.textContent = `${advancers.length}件を抽出しました`;
      }

      // 成形済み（正規化）JSON から roundRobinMatches を復元する。
      // jsonOutput を手動編集した場合、編集内容は allGroupMatches（UI状態）に
      // 反映されないため、持ち越し用のRR結果は編集後JSONから組み立てる。
      // これによりRRで敗退した（本戦に進出しない）選手の情報も欠落しない。
      function rrMatchesFromNormalized(norm) {
        if (!norm || !Array.isArray(norm.matches)) return [];
        const partById = new Map(
          (norm.participants || []).map((p) => [p.id, p]),
        );
        const entryById = new Map(
          (norm.entries || []).map((e) => [e.entryNo, e]),
        );
        const infoFor = (entry) =>
          (entry && Array.isArray(entry.playerIds) ? entry.playerIds : []).map(
            (id) => {
              const p = partById.get(id);
              return p
                ? {
                    lastName: p.lastName,
                    firstName: p.firstName,
                    team: p.team,
                    prefecture: p.prefecture,
                    tempId: id,
                    playerId: null,
                  }
                : { tempId: id, playerId: null };
            },
          );
        const rows = [];
        for (const m of norm.matches) {
          if (m.stage !== 'roundrobin') continue;
          const a = m.entries && m.entries[0];
          const b = m.entries && m.entries[1];
          if (a == null || b == null) continue;
          const ea = entryById.get(a);
          const eb = entryById.get(b);
          const sa = m.scores ? m.scores[String(a)] : undefined;
          const sb = m.scores ? m.scores[String(b)] : undefined;
          if (sa == null || sb == null) continue;
          const winA = m.winnerEntryNo === a;
          rows.push({
            group: m.group,
            pair: (ea && ea.playerIds) || [],
            opponents: infoFor(eb),
            result: winA ? 'win' : 'lose',
            games: { won: String(sa), lost: String(sb) },
            entryNo: a,
            category: 'doubles',
          });
          rows.push({
            group: m.group,
            pair: (eb && eb.playerIds) || [],
            opponents: infoFor(ea),
            result: winA ? 'lose' : 'win',
            games: { won: String(sb), lost: String(sa) },
            entryNo: b,
            category: 'doubles',
          });
        }
        return rows;
      }

      function onClickGoTournament() {
        const statusEl = document.getElementById('advanceStatus');
        statusEl.style.color = '#c62828';
        statusEl.textContent = '';
        let advancers;
        try {
          advancers = JSON.parse(
            document.getElementById('advancersJson').value,
          );
        } catch (e) {
          statusEl.textContent =
            '進出ペアのJSONパースエラー: ' + e.message;
          return;
        }
        if (!Array.isArray(advancers) || !advancers.length) {
          statusEl.textContent = '進出ペアを先に抽出してください';
          return;
        }
        updateJsonOutput();
        if (!lastRawOutput) {
          statusEl.textContent = 'ラウンドロビン結果がありません';
          return;
        }

        // 持ち越すRR結果：手動編集済みなら編集後JSONから復元し、
        // 未編集ならUI状態（lastRawOutput）をそのまま使う。
        let rrMatchesForCarry = lastRawOutput.roundRobinMatches;
        if (jsonManuallyEdited) {
          let edited;
          try {
            edited = JSON.parse(document.getElementById('jsonOutput').value);
          } catch (e) {
            statusEl.textContent =
              '編集済みJSONのパースに失敗しました: ' + e.message;
            return;
          }
          rrMatchesForCarry = rrMatchesFromNormalized(edited);
          if (!rrMatchesForCarry.length) {
            statusEl.textContent =
              '編集済みJSONからラウンドロビン結果を取得できませんでした';
            return;
          }
        }

        // RR結果を持ち越してトーナメント出力にマージする
        // （standings は normalize 側で roundRobinMatches から再計算されるため参考値）
        ToolBridge.setRRCarry({
          roundRobinMatches: rrMatchesForCarry,
          standings: lastRawOutput.standings,
        });
        ToolBridge.storeInput('tournament', advancers);
        location.href = '../tournament3/index.html';
      }

      // 手動編集の検知：ユーザーがJSONを編集したら自動上書きを止める
      document.getElementById('jsonOutput').addEventListener('input', () => {
        jsonManuallyEdited = true;
        setJsonEditStatus();
      });

      displayMatches();
    </script>
  </body>
</html>
