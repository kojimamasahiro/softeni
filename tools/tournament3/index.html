<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>トーナメント管理</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1>トーナメント試合管理</h1>
  <div style="margin-bottom: 10px">
    <label for="roundInput">ラウンド番号を変更:</label>
    <input type="number" id="roundInput" min="1" value="1" style="width: 60px" />
    <button id="setRoundBtn">変更</button>
  </div>
  <div style="margin-bottom: 10px">
    <label for="totalScoredMatchesInput">完了試合数(自動スクロール用):</label>
    <input type="number" id="totalScoredMatchesInput" min="0" value="0" style="width: 60px" />
  </div>
  <label>
    <input type="checkbox" id="roundNameToggle" checked />
    決勝・準決勝の表記にする
  </label>
  <button onclick="onClickGenerate()">出力</button>

  <div id="roundName"></div>
  <div id="matches"></div>
  <button id="nextRoundBtn">次のラウンドへ</button>

  <h2>最終JSON出力</h2>
  <textarea id="jsonOutput" style="height: 400px"></textarea>

  <!-- キーボードショートカットヘルプボタン -->
  <button class="keyboard-help-button" onclick="toggleHelp()" title="キーボードショートカット (?)">?</button>

  <script src="initialPlayer.js"></script>
  <script>
    /** =========================
     *  全ラウンド同時編集 版
     *  （既存HTMLの<script>差し替え）
     *  ========================= */

    // 初期スコア
    const initScore = 2;
    const initScore1 = initScore;
    const initScore2 = initScore;

    // スクロール量の定数
    const SCROLL_AMOUNT_DEFAULT = 190;        // 通常のスコア入力後のスクロール量
    const SCROLL_AMOUNT_PACKIN = 118;         // パッキン操作後のスクロール量
    const SCROLL_AMOUNT_FALLBACK = 190;       // フォールバック用のスクロール量

    // Global counter for completed matches to manage auto-scrolling
    let totalScoredMatches = 0;
    const completedMatchSet = new Set();
    // When a packin toggle occurs we want to use a smaller scroll amount
    // for the next auto-scroll. After one use it will be reset to null.
    let packinScrollAmount = null;
    // カテゴリ
    const category = initialPlayers[0].category; // doubles, singles, team, prefecture など

    // 編集フラグ（ブラウザバック等の警告用）
    let isDirty = false;

    // パッキン用ダミー
    const byePlayer = { id: 'bye', name: '1回戦免除', information: [] };

    // DOM
    const matchesRoot = document.getElementById('matches');
    const roundNameToggleEl = document.getElementById('roundNameToggle');
    const jsonOutputEl = document.getElementById('jsonOutput');
    const totalScoredMatchesInput = document.getElementById(
      'totalScoredMatchesInput',
    );

    // Helper: detect if an element is scrollable (has overflow)
    function isElementScrollable(el) {
      return !!el && el.scrollHeight > el.clientHeight;
    }

    // Helper: perform scroll on matchesRoot if it's scrollable, otherwise on window
    function performScroll(amount, behavior = '') {
      if (isElementScrollable(matchesRoot)) {
        matchesRoot.scrollBy({ top: amount, behavior });
      } else {
        window.scrollBy({ top: amount, behavior });
      }
    }

    // Helper: Check if a number is a power of 2
    function isPowerOfTwo(n) {
      return n > 0 && (n & (n - 1)) === 0;
    }

    // Initialize input
    totalScoredMatchesInput.value = totalScoredMatches;

    // Listen for manual changes
    totalScoredMatchesInput.addEventListener('change', (e) => {
      totalScoredMatches = Number(e.target.value);
      validateMatchCount();
    });
    totalScoredMatchesInput.addEventListener('input', validateMatchCount);
    // 既存UIは残すが操作は不要
    document.getElementById('roundInput').disabled = true;
    document.getElementById('setRoundBtn').disabled = true;
    document.getElementById('nextRoundBtn').style.display = 'none';

    // ========================================
    // キーボードショートカット: 変数の早期宣言
    // ========================================
    let currentFocus = {
      round: 0,
      match: 0,
      player: 'p1' // 'p1' or 'p2'
    };
    let isHelpVisible = false;
    let isBulkPackinMode = false;

    // ---------- ラウンド名 ----------
    function roundLabelByCount(numMatches) {
      if (!roundNameToggleEl.checked) return null;
      if (numMatches === 1) return '決勝';
      if (numMatches === 2) return '準決勝';
      if (numMatches === 4) return '準々決勝';
      return null;
    }
    function getRoundNameByIndex(idx, total) {
      const rev = total - idx;
      if (roundNameToggleEl.checked) {
        if (rev === 1) return '決勝';
        if (rev === 2) return '準決勝';
        if (rev === 3) return '準々決勝';
      }
      return `${idx + 1}回戦`;
    }

    // ---------- ブラケット構築 ----------
    // Round: { matches: [ {p1, p2, scores:{p1,p2}, winner, retiredFlags} ... ] }
    let bracket = buildBracket(initialPlayers);
    autoResolveByesAndPropagate();

    // ★ 追加：最初の描画前に未設定スコアへ初期値を適用
    applyInitialScoresToEditableMatches();

    renderBracket();
    updateJsonOutput();

    // 初期ラウンドから決勝まで配列で作る（initialPlayersは既にbyeを含め偶数並び前提）
    function buildBracket(players) {
      const rounds = [];
      let current = [];

      for (let i = 0; i < players.length; i += 2) {
        current.push(newMatch(players[i], players[i + 1]));
      }
      rounds.push({ matches: current });

      // 次ラウンド以降は空の枠だけ先に作る
      let size = current.length;
      while (size > 1) {
        size = Math.ceil(size / 2);
        rounds.push({
          matches: Array.from({ length: size }, () => newMatch(null, null)),
        });
      }
      return rounds;
    }

    function newMatch(p1, p2) {
      return {
        p1: p1 ?? byePlayer,
        p2: p2 ?? byePlayer,
        scores: { p1: null, p2: null },
        winner: null,
        // 個人・団体どちらでも使う退避フラグ
        p1Retired: false,
        p2Retired: false,
        autoFromBye: false,
        packinMarked: false, // パッキン指定フラグ
        p2PackinMarked: false, // Packin flag for Player 2 (transient for logic)
      };
    }

    // ========================================
    // キーボードショートカット: フォーカス表示関数（早期定義）
    // ========================================

    // フォーカスを視覚的に表示
    function applyFocusVisuals() {
      // すべてのフォーカスをクリア
      document.querySelectorAll('.match-result.focused').forEach(el => {
        el.classList.remove('focused');
      });
      document.querySelectorAll('.player-score-row.focused').forEach(el => {
        el.classList.remove('focused');
      });

      // 現在のフォーカス位置にスタイルを適用
      const matchCard = document.querySelector(
        `.match-result[data-round="${currentFocus.round}"][data-match="${currentFocus.match}"]`
      );
      if (matchCard) {
        matchCard.classList.add('focused');
        const playerRow = matchCard.querySelector(`.player-score-row[data-player="${currentFocus.player}"]`);
        if (playerRow) {
          playerRow.classList.add('focused');
        }

        // スクロールして表示
        matchCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // ---------- 表示 ----------
    function renderBracket() {
      matchesRoot.innerHTML = '';
      validateBracketStructure();

      const container = document.createElement('div');
      container.style.display = 'grid';
      container.style.gridTemplateColumns = `repeat(${bracket.length}, minmax(260px, 1fr))`;
      container.style.gap = '16px';

      bracket.forEach((round, rIdx) => {
        const roundCol = document.createElement('section');
        roundCol.className = 'round-column';

        const h = document.createElement('h3');
        h.textContent = getRoundNameByIndex(rIdx, bracket.length);
        roundCol.appendChild(h);

        round.matches.forEach((m, mIdx) => {
          // bye同士は編集不要なので薄く表示
          const isByePair = m.p1?.id === 'bye' && m.p2?.id === 'bye';
          const card = document.createElement('div');
          card.className = 'match-result';
          if (isByePair) card.style.opacity = '0.5';

          // キーボードショートカット用のデータ属性を追加
          card.dataset.round = String(rIdx);
          card.dataset.match = String(mIdx);

          // 未入力の試合をマーク
          const hasP1Score = m.scores.p1 != null;
          const hasP2Score = m.scores.p2 != null;
          const isEditableMatch = m.p1?.id !== 'bye' && m.p2?.id !== 'bye';
          if (isEditableMatch && (!hasP1Score || !hasP2Score) && !m.autoFromBye) {
            card.classList.add('pending');
          }

          const p1name = printableName(m.p1);
          const p2name = printableName(m.p2);

          card.innerHTML = `
         <div class="score-container">
           <div class="player-score-row" data-player="p1">
             <span class="player-name">${m.p1?.id ?? '-'}: ${p1name}</span>
             <div class="score-set" data-side="p1"></div>
           </div>
           <div class="player-score-row" data-player="p2">
             <span class="player-name">${m.p2?.id ?? '-'}: ${p2name}</span>
             <div class="score-set" data-side="p2"></div>
           </div>
         </div>
       `;

          // スコアボタン生成
          ['p1', 'p2'].forEach((side) => {
            const box = card.querySelector(`.score-set[data-side="${side}"]`);
            [0, 1, 2, 3, 4, 5].forEach((s) => {
              const btn = document.createElement('button');
              btn.className = 'score-button';
              btn.dataset.round = String(rIdx);
              btn.dataset.match = String(mIdx);
              btn.dataset.player = side;
              btn.dataset.score = String(s);
              btn.textContent = String(s);
              btn.addEventListener('click', onScoreClick);
              box.appendChild(btn);
            });
            const rbtn = document.createElement('button');
            rbtn.className = 'retire-button';
            rbtn.textContent = 'R';
            rbtn.dataset.round = String(rIdx);
            rbtn.dataset.match = String(mIdx);
            rbtn.dataset.player = side;
            rbtn.addEventListener('click', onRetireClick);
            box.appendChild(rbtn);
          });

          // 全ラウンド: パッキンボタンを追加（下側=p2をパッキンにする）
          // p1がbyeでない限り、パッキンボタンを表示（p2がbyeでも表示して解除できるようにする）
          if (m.p1?.id !== 'bye') {
            // パッキンコントロールのコンテナ
            const packinContainer = document.createElement('div');
            packinContainer.style.marginTop = '8px';
            packinContainer.style.display = 'flex';
            packinContainer.style.alignItems = 'center';
            packinContainer.style.gap = '8px';

            // エントリー番号ラベル
            const entryLabel = document.createElement('span');
            entryLabel.textContent = `${mIdx + 1}.`;
            entryLabel.style.fontWeight = 'bold';
            entryLabel.style.minWidth = '30px';
            entryLabel.style.fontSize = '14px';

            const packinBtn = document.createElement('button');
            packinBtn.className = 'packin-button';
            packinBtn.textContent = m.packinMarked ? '✓ 解除' : 'パッキン';
            packinBtn.style.padding = '4px 8px';
            packinBtn.style.backgroundColor = m.packinMarked ? '#ff9800' : '#2196F3';
            packinBtn.style.color = 'white';
            packinBtn.style.border = 'none';
            packinBtn.style.borderRadius = '4px';
            packinBtn.style.cursor = 'pointer';
            packinBtn.dataset.round = String(rIdx);
            packinBtn.dataset.match = String(mIdx);
            packinBtn.addEventListener('click', onPackinToggle);

            // 一括パッキン用の入力フィールド
            const bulkInput = document.createElement('input');
            bulkInput.type = 'number';
            bulkInput.min = '1';
            bulkInput.value = String(mIdx + 1); // デフォルトは現在のエントリー番号
            bulkInput.placeholder = '番号';
            bulkInput.style.width = '50px';
            bulkInput.style.padding = '4px';
            bulkInput.className = 'bulk-packin-input';
            bulkInput.dataset.match = String(mIdx);

            // 一括パッキンボタン
            const bulkBtn = document.createElement('button');
            bulkBtn.textContent = 'まで';
            bulkBtn.style.padding = '4px 8px';
            bulkBtn.style.backgroundColor = '#4CAF50';
            bulkBtn.style.color = 'white';
            bulkBtn.style.border = 'none';
            bulkBtn.style.borderRadius = '4px';
            bulkBtn.style.cursor = 'pointer';
            bulkBtn.dataset.match = String(mIdx);
            bulkBtn.addEventListener('click', onBulkPackin);

            packinContainer.appendChild(entryLabel);
            packinContainer.appendChild(packinBtn);
            packinContainer.appendChild(bulkInput);
            packinContainer.appendChild(bulkBtn);
            card.appendChild(packinContainer);
          }

          // byeは入力UI隠す
          const shouldHide = m.p1?.id === 'bye' || m.p2?.id === 'bye';
          card
            .querySelectorAll('.score-button,.retire-button')
            .forEach((b) => {
              b.style.display = shouldHide ? 'none' : 'inline-block';
            });

          // 選択状態の反映
          updateScoreButtonsUI(rIdx, mIdx, card);

          roundCol.appendChild(card);
        });

        container.appendChild(roundCol);
      });

      matchesRoot.appendChild(container);

      // キーボードショートカット: フォーカス状態を再適用
      applyFocusVisuals();
    }

    // ========================================
    // キーボードショートカット機能
    // ========================================

    // フォーカスを移動
    function moveFocusToMatch(roundIdx, matchIdx, playerSide) {
      // 範囲チェック
      if (roundIdx < 0 || roundIdx >= bracket.length) return false;
      if (matchIdx < 0 || matchIdx >= bracket[roundIdx].matches.length) return false;

      currentFocus.round = roundIdx;
      currentFocus.match = matchIdx;
      currentFocus.player = playerSide || 'p1';
      applyFocusVisuals();
      return true;
    }

    // 次の選手にフォーカス（Tab）
    function focusNextPlayer() {
      const match = bracket[currentFocus.round].matches[currentFocus.match];

      if (currentFocus.player === 'p1') {
        // p1 → p2
        currentFocus.player = 'p2';
      } else {
        // p2 → 次の試合のp1
        currentFocus.player = 'p1';
        currentFocus.match++;

        // 試合がラウンド末尾を超えたら次のラウンドへ
        if (currentFocus.match >= bracket[currentFocus.round].matches.length) {
          currentFocus.match = 0;
          currentFocus.round++;

          // 全ラウンド終了なら最初に戻る
          if (currentFocus.round >= bracket.length) {
            currentFocus.round = 0;
            currentFocus.match = 0;
          }
        }
      }
      applyFocusVisuals();
    }

    // 前の選手にフォーカス（Shift+Tab）
    function focusPrevPlayer() {
      if (currentFocus.player === 'p2') {
        // p2 → p1
        currentFocus.player = 'p1';
      } else {
        // p1 → 前の試合のp2
        currentFocus.player = 'p2';
        currentFocus.match--;

        // 試合が先頭を超えたら前のラウンドへ
        if (currentFocus.match < 0) {
          currentFocus.round--;

          // 最初のラウンドを超えたら最後に戻る
          if (currentFocus.round < 0) {
            currentFocus.round = bracket.length - 1;
          }

          currentFocus.match = bracket[currentFocus.round].matches.length - 1;
        }
      }
      applyFocusVisuals();
    }

    // 試合を上下に移動（常にp1にフォーカス）
    function focusMatchUp() {
      moveFocusToMatch(currentFocus.round, currentFocus.match - 1, 'p1');
    }

    function focusMatchDown() {
      moveFocusToMatch(currentFocus.round, currentFocus.match + 1, 'p1');
    }

    // 次の試合に移動（p1にフォーカス）
    function focusNextMatch() {
      const nextMatchIdx = currentFocus.match + 1;

      // 現在のラウンド内に次の試合がある場合
      if (nextMatchIdx < bracket[currentFocus.round].matches.length) {
        currentFocus.match = nextMatchIdx;
        currentFocus.player = 'p1';
      } else {
        // 次のラウンドへ
        if (currentFocus.round + 1 < bracket.length) {
          currentFocus.round++;
          currentFocus.match = 0;
          currentFocus.player = 'p1';
        } else {
          // 最後のラウンドの最後の試合なら最初に戻る
          currentFocus.round = 0;
          currentFocus.match = 0;
          currentFocus.player = 'p1';
        }
      }
      applyFocusVisuals();
    }

    // 選手を左右に切り替え
    function focusPlayerLeft() {
      currentFocus.player = 'p1';
      applyFocusVisuals();
    }

    function focusPlayerRight() {
      currentFocus.player = 'p2';
      applyFocusVisuals();
    }

    // ラウンドを移動
    function focusRoundLeft() {
      if (currentFocus.round > 0) {
        moveFocusToMatch(currentFocus.round - 1, 0, 'p1');
      }
    }

    function focusRoundRight() {
      if (currentFocus.round < bracket.length - 1) {
        moveFocusToMatch(currentFocus.round + 1, 0, 'p1');
      }
    }

    // 最初/最後の試合へ
    function focusFirstMatch() {
      moveFocusToMatch(0, 0, 'p1');
    }

    function focusLastMatch() {
      const lastRound = bracket.length - 1;
      const lastMatch = bracket[lastRound].matches.length - 1;
      moveFocusToMatch(lastRound, lastMatch, 'p1');
    }

    // 現在フォーカス中の選手にスコアを設定
    function setScoreForFocusedPlayer(score) {
      const rIdx = currentFocus.round;
      const mIdx = currentFocus.match;
      const side = currentFocus.player;

      setScore(rIdx, mIdx, side, score);

      // スコア入力後、次の試合に移動
      focusNextMatch();
    }

    // 現在フォーカス中の選手をリタイアにする
    function retireFocusedPlayer() {
      const rIdx = currentFocus.round;
      const mIdx = currentFocus.match;
      const side = currentFocus.player;

      isDirty = true;
      const match = bracket[rIdx].matches[mIdx];
      const opp = side === 'p1' ? 'p2' : 'p1';
      match[`${side}Retired`] = true;
      match[`${opp}Retired`] = true;
      match.scores[side] = 0;
      match.scores[opp] = initScore;
      match.winner = match[opp]?.id ?? null;

      propagateWinner(rIdx, mIdx);
      renderBracket();
      updateJsonOutput();
    }

    // 現在の試合のパッキンをトグル
    function togglePackinForFocusedMatch() {
      // 1回戦のみ
      if (currentFocus.round !== 0) {
        alert('パッキンは1回戦のみ設定できます');
        return;
      }

      const mIdx = currentFocus.match;
      const match = bracket[0].matches[mIdx];
      const wasPackinMarked = match.packinMarked;

      match.packinMarked = !match.packinMarked;
      match.p2PackinMarked = false;

      rebuildBracketWithPackin();
      renderBracket();
      updateJsonOutput();

      if (match.packinMarked) {
        // パッキンをONにした場合
        packinScrollAmount = SCROLL_AMOUNT_PACKIN;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const amount = typeof packinScrollAmount === 'number' ? packinScrollAmount : SCROLL_AMOUNT_FALLBACK;
            performScroll(amount, 'instant');
            packinScrollAmount = null;
          });
        });

        // 次の試合にフォーカスを移動
        const nextMatchIdx = mIdx + 1;
        if (nextMatchIdx < bracket[0].matches.length) {
          currentFocus.match = nextMatchIdx;
          currentFocus.player = 'p1';
          applyFocusVisuals();
        }
      }
    }

    // ヘルプパネルの表示/非表示
    function toggleHelp() {
      isHelpVisible = !isHelpVisible;
      renderHelpPanel();
    }

    function renderHelpPanel() {
      let existingOverlay = document.querySelector('.keyboard-help-overlay');
      if (existingOverlay) {
        existingOverlay.remove();
      }

      if (!isHelpVisible) return;

      const overlay = document.createElement('div');
      overlay.className = 'keyboard-help-overlay';

      const panel = document.createElement('div');
      panel.className = 'keyboard-help-panel';

      panel.innerHTML = `
        <h2>⌨️ キーボードショートカット</h2>
        
        <div class="keyboard-help-section">
          <h3>📝 スコア入力</h3>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">1 - 6</div>
            <div class="keyboard-help-description">スコアを設定（1→0点、2→1点、3→2点、4→3点、5→4点、6→5点）</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">R</div>
            <div class="keyboard-help-description">選択中の選手をリタイア扱いにする</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">Tab</div>
            <div class="keyboard-help-description">次の選手へ移動</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">Shift + Tab</div>
            <div class="keyboard-help-description">前の選手へ移動</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">Enter</div>
            <div class="keyboard-help-description">次の試合へ移動</div>
          </div>
        </div>

        <div class="keyboard-help-section">
          <h3>🧭 ナビゲーション</h3>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">I / M</div>
            <div class="keyboard-help-description">試合を上下に移動</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">J / K</div>
            <div class="keyboard-help-description">同じ試合内で選手を切り替え</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">PageUp / PageDown</div>
            <div class="keyboard-help-description">ラウンド間を移動</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">Home</div>
            <div class="keyboard-help-description">最初の試合へジャンプ</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">End</div>
            <div class="keyboard-help-description">最後の試合へジャンプ</div>
          </div>
        </div>

        <div class="keyboard-help-section">
          <h3>📌 パッキン操作</h3>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">P</div>
            <div class="keyboard-help-description">現在の試合のパッキンをトグル（1回戦のみ）</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">B</div>
            <div class="keyboard-help-description">一括パッキンモードを開始</div>
          </div>
        </div>

        <div class="keyboard-help-section">
          <h3>💡 その他</h3>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">?</div>
            <div class="keyboard-help-description">このヘルプを表示/非表示</div>
          </div>
          <div class="keyboard-help-item">
            <div class="keyboard-help-key">Esc</div>
            <div class="keyboard-help-description">ヘルプを閉じる / 一括パッキンモードをキャンセル</div>
          </div>
        </div>

        <button class="keyboard-help-close">閉じる</button>
      `;

      overlay.appendChild(panel);
      document.body.appendChild(overlay);

      // 閉じるボタンとオーバーレイクリックで閉じる
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.classList.contains('keyboard-help-close')) {
          isHelpVisible = false;
          renderHelpPanel();
        }
      });
    }

    // 一括パッキンモード
    function enterBulkPackinMode() {
      if (currentFocus.round !== 0) {
        alert('一括パッキンは1回戦のみ設定できます');
        return;
      }

      isBulkPackinMode = true;
      renderBulkPackinOverlay();
    }

    function exitBulkPackinMode() {
      isBulkPackinMode = false;
      const overlay = document.querySelector('.bulk-packin-overlay');
      if (overlay) {
        overlay.remove();
      }
    }

    function renderBulkPackinOverlay() {
      let existingOverlay = document.querySelector('.bulk-packin-overlay');
      if (existingOverlay) {
        existingOverlay.remove();
      }

      const overlay = document.createElement('div');
      overlay.className = 'bulk-packin-overlay';

      const currentMatchNum = currentFocus.match + 1;

      overlay.innerHTML = `
        <div class="bulk-packin-label">一括パッキン: エントリー ${currentMatchNum} 番から</div>
        <input type="number" id="bulkPackinTarget" min="${currentMatchNum}" value="${currentMatchNum}" />
        <div class="bulk-packin-label">番まで</div>
        <button id="bulkPackinExecute">実行</button>
        <button id="bulkPackinCancel">キャンセル (Esc)</button>
      `;

      document.body.appendChild(overlay);

      const input = document.getElementById('bulkPackinTarget');
      const executeBtn = document.getElementById('bulkPackinExecute');
      const cancelBtn = document.getElementById('bulkPackinCancel');

      input.focus();
      input.select();

      executeBtn.addEventListener('click', () => {
        const targetNum = Number(input.value);
        executeBulkPackin(currentFocus.match, targetNum);
        exitBulkPackinMode();
      });

      cancelBtn.addEventListener('click', () => {
        exitBulkPackinMode();
      });

      // Enterで実行
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const targetNum = Number(input.value);
          executeBulkPackin(currentFocus.match, targetNum);
          exitBulkPackinMode();
        }
      });
    }

    function executeBulkPackin(startMatchIdx, targetEntryNumber) {
      if (!targetEntryNumber || targetEntryNumber < 1) {
        alert('有効なエントリー番号を入力してください');
        return;
      }

      const startIndex = startMatchIdx;
      const endIndex = Math.min(targetEntryNumber - 1, bracket[0].matches.length - 1);

      if (startIndex > endIndex) {
        alert('指定した番号は現在のエントリー番号より小さいです');
        return;
      }

      for (let i = startIndex; i <= endIndex; i++) {
        const match = bracket[0].matches[i];
        if (match.p1?.id !== 'bye') {
          match.packinMarked = true;
        }
        if (match.p2?.id !== 'bye') {
          match.p2PackinMarked = true;
        }
      }

      isDirty = true;
      rebuildBracketWithPackin();
      renderBracket();
      updateJsonOutput();

      packinScrollAmount = SCROLL_AMOUNT_PACKIN;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const amount = typeof packinScrollAmount === 'number' ? packinScrollAmount : SCROLL_AMOUNT_FALLBACK;
          performScroll(amount, 'instant');
          packinScrollAmount = null;
        });
      });
    }

    // グローバルキーボードイベントリスナー
    document.addEventListener('keydown', (e) => {
      // 入力フィールドにフォーカスがある場合は無視（一括パッキンモードの入力を除く）
      const activeElement = document.activeElement;
      const isInputFocused = activeElement.tagName === 'INPUT' ||
        activeElement.tagName === 'TEXTAREA' ||
        activeElement.isContentEditable;

      // 一括パッキンモード中は特別処理
      if (isBulkPackinMode && e.key === 'Escape') {
        e.preventDefault();
        exitBulkPackinMode();
        return;
      }

      // 一括パッキンモード中はその入力欄以外のキーは無視
      if (isBulkPackinMode && activeElement.id === 'bulkPackinTarget') {
        return; // Enter等は入力欄のイベントリスナーで処理
      }

      // ヘルプ表示中はEscで閉じる
      if (isHelpVisible && e.key === 'Escape') {
        e.preventDefault();
        isHelpVisible = false;
        renderHelpPanel();
        return;
      }

      // 通常の入力フィールドにフォーカスがある場合は、?とEsc以外は無視
      if (isInputFocused && e.key !== '?' && e.key !== 'Escape') {
        return;
      }

      // ? キーでヘルプ
      if (e.key === '?' || (e.shiftKey && e.key === '/')) {
        e.preventDefault();
        toggleHelp();
        return;
      }

      // ヘルプ表示中はショートカットを無効化
      if (isHelpVisible) return;

      // 数字キー（1-6）でスコア入力（1→0点、2→1点、3→2点、4→3点、5→4点、6→5点）
      if (e.key >= '1' && e.key <= '6' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        const score = Number(e.key) - 1; // キーの数字から1を引く
        setScoreForFocusedPlayer(score);
        return;
      }

      // Rキーでリタイア（Cmd/Ctrl+Rはブラウザのリロードを優先）
      if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        retireFocusedPlayer();
        return;
      }

      // Tabキーで次の選手へ
      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) {
          focusPrevPlayer();
        } else {
          focusNextPlayer();
        }
        return;
      }

      // Enterキーで次の試合へ
      if (e.key === 'Enter') {
        e.preventDefault();
        focusNextMatch();
        return;
      }

      // I/M/J/K キーでナビゲーション
      if (e.key === 'i' || e.key === 'I' || e.key === 'ArrowUp') {
        e.preventDefault();
        focusMatchUp();
        return;
      }

      if (e.key === 'm' || e.key === 'M' || e.key === 'ArrowDown') {
        e.preventDefault();
        focusMatchDown();
        return;
      }

      if (e.key === 'j' || e.key === 'J' || e.key === 'ArrowLeft') {
        e.preventDefault();
        focusPlayerLeft();
        return;
      }

      if (e.key === 'k' || e.key === 'K' || e.key === 'ArrowRight') {
        e.preventDefault();
        focusPlayerRight();
        return;
      }

      // PageUp/PageDownでラウンド移動
      if (e.key === 'PageUp') {
        e.preventDefault();
        focusRoundLeft();
        return;
      }

      if (e.key === 'PageDown') {
        e.preventDefault();
        focusRoundRight();
        return;
      }

      // Home/Endで最初/最後の試合へ
      if (e.key === 'Home') {
        e.preventDefault();
        focusFirstMatch();
        return;
      }

      if (e.key === 'End') {
        e.preventDefault();
        focusLastMatch();
        return;
      }

      // Pキーでパッキントグル
      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePackinForFocusedMatch();
        return;
      }

      // Bキーで一括パッキンモード
      if (e.key === 'b' || e.key === 'B') {
        e.preventDefault();
        enterBulkPackinMode();
        return;
      }

      // Escapeでモーダルを閉じる
      if (e.key === 'Escape') {
        e.preventDefault();
        if (isBulkPackinMode) {
          exitBulkPackinMode();
        } else if (isHelpVisible) {
          isHelpVisible = false;
          renderHelpPanel();
        }
        return;
      }
    });

    // ブラウザバック・タブ閉じ警告
    window.addEventListener('beforeunload', (e) => {
      if (isDirty) {
        // 標準的なブラウザ警告を表示（メッセージ内容は最近のブラウザでは無視されることが多いが、
        // 戻り値を設定することでプロンプトが表示される）
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ========================================
    // キーボードショートカット機能ここまで
    // ========================================

    function printableName(p) {
      if (!p) return '未定';
      if (p.id === 'bye') return 'パッキン';
      if (p.information && Array.isArray(p.information)) {
        return buildPairName(p.information);
      }
      return p.name ?? '未定';
    }

    function getWinnerName(match) {
      if (!match?.winner) return '未定';
      if (match.winner === 'bye') return 'パッキン';
      if (match.winner === match.p1?.id) return printableName(match.p1);
      if (match.winner === match.p2?.id) return printableName(match.p2);
      return '未定';
    }

    // ---------- クリックハンドラ ----------
    function onScoreClick(e) {
      const btn = e.currentTarget;
      const rIdx = Number(btn.dataset.round);
      const mIdx = Number(btn.dataset.match);
      const side = btn.dataset.player;
      const score = Number(btn.dataset.score);
      isDirty = true;
      setScore(rIdx, mIdx, side, score);
    }

    function onRetireClick(e) {
      const btn = e.currentTarget;
      const rIdx = Number(btn.dataset.round);
      const mIdx = Number(btn.dataset.match);
      const side = btn.dataset.player;

      const match = bracket[rIdx].matches[mIdx];
      const opp = side === 'p1' ? 'p2' : 'p1';
      match[`${side}Retired`] = true;
      match[`${opp}Retired`] = true; // 相手側にも記録（互換維持）
      match.scores[side] = 0;
      match.scores[opp] = initScore;
      match.winner = match[opp]?.id ?? null;

      propagateWinner(rIdx, mIdx);
      renderBracket();
      updateJsonOutput();
    }

    // ---------- 一括パッキン ----------
    function onBulkPackin(e) {
      const btn = e.currentTarget;
      const currentMatchIdx = Number(btn.dataset.match);

      // 同じ行の入力フィールドから値を取得
      const input = btn.previousElementSibling;
      const targetEntryNumber = Number(input.value);

      if (!targetEntryNumber || targetEntryNumber < 1) {
        alert('有効なエントリー番号を入力してください');
        return;
      }

      // 現在のエントリー番号からtargetEntryNumberまでのエントリーをパッキンにする
      // エントリー番号 = matchIndex + 1
      const startIndex = currentMatchIdx;
      const endIndex = Math.min(targetEntryNumber - 1, bracket[0].matches.length - 1);

      // 範囲チェック
      if (startIndex > endIndex) {
        alert('指定した番号は現在のエントリー番号より小さいです');
        return;
      }

      for (let i = startIndex; i <= endIndex; i++) {
        const match = bracket[0].matches[i];
        if (match.p1?.id !== 'bye') {
          match.packinMarked = true;
        }
        if (match.p2?.id !== 'bye') {
          match.p2PackinMarked = true;
        }
      }

      isDirty = true;
      // Rebuild bracket with new packin configuration
      rebuildBracketWithPackin();
      renderBracket();
      updateJsonOutput();

      // Perform scroll after bulk packin
      packinScrollAmount = SCROLL_AMOUNT_PACKIN;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const amount = typeof packinScrollAmount === 'number' ? packinScrollAmount : SCROLL_AMOUNT_FALLBACK;
          performScroll(amount, 'instant');
          packinScrollAmount = null;
        });
      });
    }

    // ---------- パッキントグル ----------
    function onPackinToggle(e) {
      const btn = e.currentTarget;
      const mIdx = Number(btn.dataset.match);
      const match = bracket[0].matches[mIdx];

      // Toggle packin state
      match.packinMarked = !match.packinMarked;
      // Clear p2PackinMarked when toggling manually (reset to standard single-seed behavior)
      match.p2PackinMarked = false;

      isDirty = true;
      // Rebuild bracket with new packin configuration
      rebuildBracketWithPackin();
      renderBracket();
      updateJsonOutput();

      // If packin was turned ON, perform a short deferred scroll.
      if (match.packinMarked) {
        // Use a smaller scroll amount for the immediate auto-scroll
        // that follows a packin change to avoid overshooting.
        packinScrollAmount = SCROLL_AMOUNT_PACKIN;

        // After re-rendering the DOM we need to defer scrolling so it actually takes effect.
        // Use requestAnimationFrame twice to ensure layout/paint completed.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const amount = typeof packinScrollAmount === 'number' ? packinScrollAmount : SCROLL_AMOUNT_FALLBACK;
            performScroll(amount, 'instant');
            packinScrollAmount = null;
          });
        });
      } else {
        // packin was turned OFF: do not perform any automatic scroll.
        packinScrollAmount = null;
      }
    }

    function rebuildBracketWithPackin() {
      // Save all match results before rebuilding
      const savedMatchResults = new Map();
      bracket.forEach((round, rIdx) => {
        round.matches.forEach((m, mIdx) => {
          // Create a unique key based on player IDs (not match position)
          const p1Id = m.p1?.id;
          const p2Id = m.p2?.id;
          if (p1Id && p2Id && p1Id !== 'bye' && p2Id !== 'bye') {
            // Sort IDs to create a consistent key regardless of order
            const key = [p1Id, p2Id].sort().join('_vs_');
            savedMatchResults.set(key, {
              scores: { ...m.scores },
              winner: m.winner,
              p1Retired: m.p1Retired,
              p2Retired: m.p2Retired,
              p1Id: p1Id,
              p2Id: p2Id,
            });
          }
        });
      });

      // Get all original players from first round (excluding byes)
      const allPlayers = [];
      bracket[0].matches.forEach((m) => {
        if (m.p1?.id !== 'bye') allPlayers.push(m.p1);
        if (m.p2?.id !== 'bye') allPlayers.push(m.p2);
      });

      // Collect which players are marked as packin (using player IDs instead of indices)
      const packinPlayerIds = new Set();
      bracket[0].matches.forEach((m) => {
        if (m.packinMarked && m.p1?.id !== 'bye') {
          packinPlayerIds.add(m.p1.id);
        }
        if (m.p2PackinMarked && m.p2?.id !== 'bye') {
          packinPlayerIds.add(m.p2.id);
        }
      });

      // Calculate the correct bracket size
      const packinCount = packinPlayerIds.size;
      const totalSlots = allPlayers.length + packinCount;
      let bracketSize = 1;
      while (bracketSize < totalSlots) {
        bracketSize *= 2;
      }

      // Build new player list by inserting byes for packin players, preserving original order
      const playersWithByes = [];
      let playerIndex = 0;

      while (playerIndex < allPlayers.length) {
        const currentPlayer = allPlayers[playerIndex];

        // Check if this player is marked as packin
        if (currentPlayer?.id !== 'bye' && packinPlayerIds.has(currentPlayer.id)) {
          // This player gets a bye opponent (packin)
          playersWithByes.push(currentPlayer);
          playersWithByes.push(byePlayer);
          playerIndex++;
        } else {
          // Normal match - take two players
          playersWithByes.push(currentPlayer);
          playerIndex++;

          if (playerIndex < allPlayers.length) {
            const nextPlayer = allPlayers[playerIndex];
            // Check if next player is also packin
            if (nextPlayer?.id !== 'bye' && packinPlayerIds.has(nextPlayer.id)) {
              // Next player is packin, so current player gets a bye opponent
              playersWithByes.push(byePlayer);
              // Don't increment playerIndex, we'll process the packin player in next iteration
            } else {
              // Normal pair
              playersWithByes.push(nextPlayer);
              playerIndex++;
            }
          } else {
            playersWithByes.push(byePlayer);
          }
        }
      }

      // Ensure even number
      while (playersWithByes.length % 2 !== 0) {
        playersWithByes.push(byePlayer);
      }

      // Rebuild bracket
      bracket = buildBracket(playersWithByes);

      // Restore packin marks based on player IDs
      bracket[0].matches.forEach((m) => {
        if (m.p1?.id && m.p1.id !== 'bye' && packinPlayerIds.has(m.p1.id)) {
          m.packinMarked = true;
        }
      });

      // Restore saved match results
      bracket.forEach((round, rIdx) => {
        round.matches.forEach((m, mIdx) => {
          const p1Id = m.p1?.id;
          const p2Id = m.p2?.id;
          if (p1Id && p2Id && p1Id !== 'bye' && p2Id !== 'bye') {
            const key = [p1Id, p2Id].sort().join('_vs_');
            const saved = savedMatchResults.get(key);
            if (saved) {
              // Restore scores and winner
              m.scores = { ...saved.scores };
              m.winner = saved.winner;
              m.p1Retired = saved.p1Retired;
              m.p2Retired = saved.p2Retired;

              // Mark this match as completed if it has scores
              if (m.scores.p1 != null && m.scores.p2 != null) {
                const matchId = `${rIdx}_${mIdx}`;
                completedMatchSet.add(matchId);
              }
            }
          }
        });
      });

      autoResolveByesAndPropagate();
      applyInitialScoresToEditableMatches();
    }

    // ---------- 勝者決定＆伝播 ----------
    function setScore(rIdx, mIdx, side, score) {
      const match = bracket[rIdx].matches[mIdx];

      if (match.p1?.id === 'bye') {
        match.winner = match.p2?.id ?? null;
      } else if (match.p2?.id === 'bye') {
        match.winner = match.p1?.id ?? null;
      } else {
        match.scores[side] = score;
        const s1 = match.scores.p1;
        const s2 = match.scores.p2;
        if (s1 != null && s2 != null) {
          if (s1 > s2) match.winner = match.p1?.id ?? null;
          else if (s2 > s1) match.winner = match.p2?.id ?? null;
          else match.winner = null; // 引き分けは未決定
        } else {
          match.winner = null;
        }
      }

      // After setting score, check if this match is now completed
      if (match.scores.p1 != null && match.scores.p2 != null) {
        const matchId = `${rIdx}_${mIdx}`;
        if (!completedMatchSet.has(matchId)) {
          completedMatchSet.add(matchId);
          // Increment counter only for new completions
          totalScoredMatches++;
          if (totalScoredMatchesInput)
            totalScoredMatchesInput.value = totalScoredMatches;
        }
      }
      // totalScoredMatches = completedMatchSet.size; // Removed to allow manual adjustment

      // Propagate winner and render UI
      // Save current scroll position to prevent reset during re-render
      const currentScrollTop = matchesRoot ? matchesRoot.scrollTop : 0;
      propagateWinner(rIdx, mIdx);
      renderBracket();
      if (matchesRoot) {
        matchesRoot.scrollTop = currentScrollTop;
      }

      // Auto-scroll after every 4 completed matches
      if (totalScoredMatches > 0) {
        console.log('Auto-scrolling after', totalScoredMatches, 'matches');
        // Use configurable scroll amount. When a packin toggle happened
        // recently we may want a smaller scroll amount to avoid overshooting.
        // packinScrollAmount is set by onPackinToggle and reverted after one use.
        const amount = typeof packinScrollAmount === 'number' ? packinScrollAmount : SCROLL_AMOUNT_DEFAULT;

        performScroll(amount, 'instant');
        // If packinScrollAmount was used, reset it so subsequent scrolls use default
        if (typeof packinScrollAmount === 'number') packinScrollAmount = null;
      }

      // Update JSON output after UI changes
      updateJsonOutput();
    }

    function propagateWinner(rIdx, mIdx) {
      // 次ラウンドがなければ終了
      if (rIdx >= bracket.length - 1) return;

      const match = bracket[rIdx].matches[mIdx];
      const nextRound = bracket[rIdx + 1];
      const nextIndex = Math.floor(mIdx / 2);
      const isLeft = mIdx % 2 === 0;

      // 勝者の実体を渡す
      const winnerId = match.winner;
      let winnerObj = byePlayer;
      if (winnerId && winnerId !== 'bye') {
        winnerObj = match.p1?.id === winnerId ? match.p1 : match.p2;
      }

      const targetMatch = nextRound.matches[nextIndex];
      if (isLeft) targetMatch.p1 = winnerObj;
      else targetMatch.p2 = winnerObj;

      // 次枠をクリア（勝者未決時）
      if (!winnerId) {
        if (isLeft) targetMatch.p1 = byePlayer;
        else targetMatch.p2 = byePlayer;
        targetMatch.winner = null;
        targetMatch.scores = { p1: null, p2: null };
      }

      // 次枠が確定byeなら自動決定
      if (targetMatch.p1?.id === 'bye' && targetMatch.p2?.id !== 'bye') {
        targetMatch.winner = targetMatch.p2.id;
        targetMatch.scores = { p1: 0, p2: initScore };
        targetMatch.autoFromBye = true;
      } else if (
        targetMatch.p2?.id === 'bye' &&
        targetMatch.p1?.id !== 'bye'
      ) {
        targetMatch.winner = targetMatch.p1.id;
        targetMatch.scores = { p1: initScore, p2: 0 };
        targetMatch.autoFromBye = true;
      } else if (
        targetMatch.p1?.id === 'bye' &&
        targetMatch.p2?.id === 'bye'
      ) {
        targetMatch.winner = 'bye';
        targetMatch.scores = { p1: 0, p2: 0 };
        targetMatch.autoFromBye = true;
      }

      // ★ 追加：両者がbyeでなく、スコア未設定なら初期値を与える
      if (targetMatch.p1?.id !== 'bye' && targetMatch.p2?.id !== 'bye') {
        if (targetMatch.scores.p1 == null && targetMatch.scores.p2 == null) {
          ensureDefaultScoresForMatch(targetMatch);
          // 勝者は同点なので未決定のまま
        }
      }

      // ★ 追加：両者そろったら、BYE由来の自動結果をクリアして初期スコアを適用
      if (targetMatch.p1?.id !== 'bye' && targetMatch.p2?.id !== 'bye') {
        const wasAuto = targetMatch.autoFromBye === true;
        const looksLikeAuto =
          (Number(targetMatch.scores?.p1) === 0 &&
            Number(targetMatch.scores?.p2) === initScore) ||
          (Number(targetMatch.scores?.p1) === initScore &&
            Number(targetMatch.scores?.p2) === 0) ||
          (Number(targetMatch.scores?.p1) === 5 &&
            Number(targetMatch.scores?.p2) === 0) ||
          (Number(targetMatch.scores?.p1) === 0 &&
            Number(targetMatch.scores?.p2) === 5);

        if (wasAuto || looksLikeAuto) {
          targetMatch.autoFromBye = false;
          targetMatch.winner = null;
          targetMatch.scores = { p1: null, p2: null };
        }
        // 未設定なら初期値を反映
        ensureDefaultScoresForMatch(targetMatch);
      }

      // さらに先も連鎖的にクリア/決定
      propagateWinner(rIdx + 1, nextIndex);
    }

    function autoResolveByesAndPropagate() {
      // 1R目のbyeを自動確定 & 伝播
      bracket[0].matches.forEach((m, i) => {
        if (m.p1?.id === 'bye' && m.p2?.id !== 'bye') {
          m.winner = m.p2.id;
          m.scores = { p1: 0, p2: 5 };
          m.autoFromBye = true;
        } else if (m.p2?.id === 'bye' && m.p1?.id !== 'bye') {
          m.winner = m.p1.id;
          m.scores = { p1: 5, p2: 0 };
          m.autoFromBye = true;
        } else if (m.p1?.id === 'bye' && m.p2?.id === 'bye') {
          m.winner = 'bye';
          m.scores = { p1: 0, p2: 0 };
          m.autoFromBye = true;
        }
        propagateWinner(0, i);
      });
    }

    // ---------- UIの選択状態反映 ----------
    function updateScoreButtonsUI(rIdx, mIdx, card) {
      const m = bracket[rIdx].matches[mIdx];
      ['p1', 'p2'].forEach((side) => {
        const selected = m.scores[side];
        card.querySelectorAll(`.score-button`).forEach((btn) => {
          const isMine =
            btn.dataset.round == rIdx &&
            btn.dataset.match == mIdx &&
            btn.dataset.player === side;
          if (!isMine) return;
          const val = Number(btn.dataset.score);
          btn.classList.toggle('selected', selected === val);
        });
      });
      const winnerEl = card.querySelector('.winner');
      if (winnerEl) winnerEl.textContent = getWinnerName(m);
    }

    // ---------- 試合数チェック ----------
    function validateMatchCount() {
      let actualCount = 0;
      bracket.forEach((round) => {
        round.matches.forEach((m) => {
          if (!m.autoFromBye && m.scores.p1 != null && m.scores.p2 != null) {
            actualCount++;
          }
        });
      });

      const currentVal = Number(totalScoredMatchesInput.value);
      if (currentVal !== actualCount) {
        totalScoredMatchesInput.style.backgroundColor = '#ffcccc';
      } else {
        totalScoredMatchesInput.style.backgroundColor = '';
      }
    }

    // ---------- ブラケット構造チェック ----------
    function validateBracketStructure() {
      // Round 1 check
      const r1Count = bracket[0]?.matches.length || 0;
      const r1Valid = isPowerOfTwo(r1Count);

      // Round 2 check (if exists)
      let r2Valid = true;
      if (bracket.length > 1) {
        const r2Count = bracket[1]?.matches.length || 0;
        r2Valid = isPowerOfTwo(r2Count);
      }

      if (!r1Valid || !r2Valid) {
        matchesRoot.style.backgroundColor = '#fff0f0'; // Warning color (mistyrose-ish)
      } else {
        matchesRoot.style.backgroundColor = '';
      }
    }

    // ---------- JSON 出力 ----------
    function collectRoundHistory() {
      // bracket から互換の roundHistory を生成
      return bracket.map((round, rIdx) => {
        // ラベル
        const name = getRoundNameByIndex(rIdx, bracket.length);
        // ディープコピーして round を付与するのは updateJsonOutput で行う
        return {
          round: name,
          matches: round.matches.map((m) => ({
            p1: m.p1,
            p2: m.p2,
            scores: { ...m.scores },
            winner: m.winner,
            p1Retired: m.p1Retired,
            p2Retired: m.p2Retired,
          })),
        };
      });
    }

    function updateJsonOutput() {
      const useRoundNames = roundNameToggleEl.checked;
      const output = {};
      const roundHistory = collectRoundHistory();

      const roundCount = roundHistory.length;
      const resultPairs = new Set();

      const roundRankings = {};
      roundRankings[roundCount - 1] = { winner: '優勝', loser: '準優勝' };
      if (roundCount - 2 >= 0)
        roundRankings[roundCount - 2] = { loser: 'ベスト4' };
      if (roundCount - 3 >= 0)
        roundRankings[roundCount - 3] = { loser: 'ベスト8' };

      const getPairKey = (info) =>
        info?.information?.map((p) => p.tempId).join('-');
      const getPairArray = (info) =>
        info?.information?.map((p) => p.tempId).filter(Boolean);
      const isValidPair = (arr) =>
        Array.isArray(arr) && arr.every((id) => id != null);

      // results（順位サマリ）
      if (useRoundNames) {
        const resultSummary = [];
        const seenTeams = new Set();

        if (category === 'team' || category === 'prefecture') {
          const teamRankingLabels = {
            [roundCount - 1]: { winner: '優勝', loser: '準優勝' },
            [roundCount - 2]: { loser: 'ベスト4' },
            [roundCount - 3]: { loser: 'ベスト8' },
          };
          for (let i = roundCount - 1; i >= 0; i--) {
            const matches = roundHistory[i].matches;
            const ranking = teamRankingLabels[i];
            if (!ranking) continue;
            for (const match of matches) {
              if (!match.p1 || !match.p2 || !match.winner) continue;
              const isP1Winner = match.winner === match.p1.id;
              const winnerTeam = isP1Winner ? match.p1 : match.p2;
              const loserTeam = isP1Winner ? match.p2 : match.p1;

              if (ranking.winner && !seenTeams.has(winnerTeam.id)) {
                resultSummary.push({
                  team: winnerTeam.team || winnerTeam.name,
                  prefecture: winnerTeam.prefecture || '',
                  result: ranking.winner,
                  category: 'team',
                });
                seenTeams.add(winnerTeam.id);
              }
              if (ranking.loser && !seenTeams.has(loserTeam.id)) {
                resultSummary.push({
                  team: loserTeam.team || loserTeam.name,
                  prefecture: loserTeam.prefecture || '',
                  result: ranking.loser,
                  category: 'team',
                });
                seenTeams.add(loserTeam.id);
              }
            }
          }
        } else {
          for (let i = roundCount - 1; i >= 0; i--) {
            const matches = roundHistory[i].matches;
            const ranking = roundRankings[i];
            if (!ranking) continue;
            for (const match of matches) {
              if (!match.p1 || !match.p2 || !match.winner) continue;
              const p1Key = getPairKey(match.p1);
              const p2Key = getPairKey(match.p2);
              const p1Arr = getPairArray(match.p1);
              const p2Arr = getPairArray(match.p2);
              if (!p1Key || !p2Key) continue;

              const isP1Winner = match.winner === match.p1.id;
              const winnerArr = isP1Winner ? p1Arr : p2Arr;
              const loserArr = isP1Winner ? p2Arr : p1Arr;
              const winnerKey = isP1Winner ? p1Key : p2Key;
              const loserKey = isP1Winner ? p2Key : p1Key;

              if (
                ranking.winner &&
                !resultPairs.has(winnerKey) &&
                isValidPair(winnerArr)
              ) {
                resultSummary.push({
                  playerIds: winnerArr,
                  result: ranking.winner,
                  category,
                });
                resultPairs.add(winnerKey);
              }
              if (
                ranking.loser &&
                !resultPairs.has(loserKey) &&
                isValidPair(loserArr)
              ) {
                resultSummary.push({
                  playerIds: loserArr,
                  result: ranking.loser,
                  category,
                });
                resultPairs.add(loserKey);
              }
            }
          }
        }
        output.results = resultSummary;
      }

      // matches
      output.matches = [];
      for (let i = 0; i < roundCount; i++) {
        const round = roundHistory[i];
        for (const match of round.matches) {
          const mWithRound = structuredClone(match);
          mWithRound.round = round.round;

          let split = [];
          if (category === 'team' || category === 'prefecture') {
            split = splitMatchByTeams(mWithRound);
          } else {
            split = splitMatchByPlayerIds(mWithRound);
          }
          output.matches.push(...split);
        }
      }

      jsonOutputEl.value = JSON.stringify(output, null, 2);
      validateMatchCount();
    }

    // ---------- 既存互換の補助関数 ----------
    function buildPairName(information) {
      const names = information.map(
        ({ lastName, firstName }) => `${lastName} ${firstName}`,
      );
      const teams = [
        ...new Set(information.map(({ team }) => team).filter(Boolean)),
      ];
      if (teams.length === 1) return `${names.join('・')}（${teams[0]}）`;
      return information
        .map(
          ({ lastName, firstName, team }) =>
            `${lastName} ${firstName}（${team}）`,
        )
        .join('・');
    }

    function splitMatchByPlayerIds(match) {
      if (match.p1?.id === 'bye' || match.p2?.id === 'bye') return [];
      const results = [];
      const p1Ids = match.p1.information.map((info) => info.tempId);
      const p2Ids = match.p2.information.map((info) => info.tempId);
      const p1IsValid = p1Ids.every((id) => id != null);
      const p2IsValid = p2Ids.every((id) => id != null);
      const p1IsWinner = match.winner === match.p1.id;
      const isUnplayed = match.winner == null;
      const p1Score = String(match.scores.p1 ?? '');
      const p2Score = String(match.scores.p2 ?? '');

      if (p1IsValid) {
        results.push({
          round: match.round,
          pair: p1Ids,
          opponents: match.p2.information,
          result: isUnplayed ? null : (p1IsWinner ? 'win' : 'lose'),
          games: isUnplayed ? null : { won: p1Score, lost: p2Score },
          entryNo: match.p1.id,
          name: buildPairName(match.p1.information),
          category,
          retired: !!match.p1Retired,
        });
      }
      if (p2IsValid) {
        results.push({
          round: match.round,
          pair: p2Ids,
          opponents: match.p1.information,
          result: isUnplayed ? null : (p1IsWinner ? 'lose' : 'win'),
          games: isUnplayed ? null : { won: p2Score, lost: p1Score },
          entryNo: match.p2.id,
          name: buildPairName(match.p2.information),
          category,
          retired: !!match.p2Retired,
        });
      }
      return results;
    }

    function splitMatchByTeams(match) {
      if (match.p1?.id === 'bye' || match.p2?.id === 'bye') return [];
      const results = [];
      function getTeamLabel(obj) {
        if (obj.tempId) return obj.tempId;
        if (obj.team && obj.prefecture)
          return `${obj.team}_${obj.prefecture}`;
        if (obj.team) return `${obj.name}_${obj.team}`;
        if (obj.prefecture) return `${obj.name}_${obj.prefecture}`;
        return obj.name;
      }
      function getCategory(obj) {
        if (!obj.team && obj.prefecture) return 'prefecture';
        return 'team';
      }
      const p1 = match.p1,
        p2 = match.p2;
      const p1IsWinner = match.winner === p1.id;
      const isUnplayed = match.winner == null;
      const p1Score = String(match.scores.p1 ?? '');
      const p2Score = String(match.scores.p2 ?? '');

      results.push({
        round: match.round,
        team: getTeamLabel(p1),
        opponents: [
          {
            lastName: '',
            firstName: '',
            team: `${p2.team}` || `${p2.name}`,
            playerId: null,
            prefecture: p2.prefecture || '',
            tempId: getTeamLabel(p2),
          },
        ],
        result: isUnplayed ? null : (p1IsWinner ? 'win' : 'lose'),
        games: isUnplayed ? null : { won: p1Score, lost: p2Score },
        entryNo: p1.id,
        name: p1.name,
        category: getCategory(p1),
        retired: !!match.p1Retired,
      });

      results.push({
        round: match.round,
        team: getTeamLabel(p2),
        opponents: [
          {
            lastName: '',
            firstName: '',
            team: `${p1.team}` || `${p1.name}`,
            playerId: null,
            prefecture: p1.prefecture || '',
            tempId: getTeamLabel(p1),
          },
        ],
        result: isUnplayed ? null : (p1IsWinner ? 'lose' : 'win'),
        games: isUnplayed ? null : { won: p2Score, lost: p1Score },
        entryNo: p2.id,
        name: p2.name,
        category: getCategory(p2),
        retired: !!match.p2Retired,
      });

      return results;
    }

    // ★ 追加：未設定(null)のスコアに初期値を適用
    function ensureDefaultScoresForMatch(m) {
      // byeは対象外
      if (!m || m.p1?.id === 'bye' || m.p2?.id === 'bye') return;
      if (m.scores == null) m.scores = { p1: null, p2: null };

      if (m.scores.p1 == null) m.scores.p1 = initScore1;
      if (m.scores.p2 == null) m.scores.p2 = initScore2;
      // 同点なので勝者は未決定のまま
    }

    function applyInitialScoresToEditableMatches() {
      bracket.forEach((round) => {
        round.matches.forEach((m) => ensureDefaultScoresForMatch(m));
      });
    }

    // トグル変更で出力ラベル更新
    roundNameToggleEl.addEventListener('change', () => {
      renderBracket();
      updateJsonOutput();
    });
  </script>
